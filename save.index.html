<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For AYA ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ffd6e0, #fff);
  overflow: hidden;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  width: 320px;
  animation: zoomIn 1.5s ease;
}

h1 {
  color: #ff4d6d;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.hidden {
  display: none;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

@keyframes zoomIn {
  from { transform: translate(-50%, -60%) scale(0.7); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
</style>
</head>

<body>

<script>
for(let i=0;i<25;i++){
  let heart=document.createElement("div");
  heart.innerHTML="❤️";
  heart.className="heart";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(heart);
}
</script>

<div class="container">

<div id="step1">
<h1>Hey AYA 💖</h1>
<p>I made this just for you...</p>
<button onclick="next(1)">Click me</button>
</div>

<div id="step2" class="hidden">
<p>You are the most beautiful thing in my life 😍</p>
<button onclick="next(2)">Next</button>
</div>

<div id="step3" class="hidden">
<p>Every moment with you is special 💕</p>
<button onclick="next(3)">Next</button>
</div>

<div id="step4" class="hidden">
<p>I just want to see you happy always 😊</p>
<button onclick="next(4)">Next</button>
</div>

<div id="step5" class="hidden">
<h1>I love you AYA ❤️</h1>
<p>Forever & Always 💍</p>
</div>

</div>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function next(n){
  document.getElementById("step"+n).classList.add("hidden");
  document.getElementById("step"+(n+1)).classList.remove("hidden");
}
</script>

</body>
</html>
